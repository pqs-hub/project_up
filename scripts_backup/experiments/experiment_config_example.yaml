# 协同效应验证实验配置示例
# 复制到项目根目录的 config.yaml 或根据需要修改

# 目标模型配置
target_model:
  base_url: "http://localhost:8001/v1"
  api_key: "EMPTY"
  model: "verilog_attack_merged_bal500"  # 与vLLM启动时的模型名一致
  timeout: 60
  max_retries: 3
  use_local_transformers: false  # false=使用vLLM，true=本地transformers
  max_new_tokens: 512  # CoT需要更多token

# Testbench配置
testbench:
  enabled: true  # 是否启用Testbench验证
  filter_mode: true  # true=过滤未通过的，false=仅记录
  simulator: "iverilog"  # iverilog 或 verilator
  timeout: 30

# 并行配置
parallelism:
  num_workers: 8  # 并发数，根据GPU/CPU资源调整

# 数据路径（实验脚本会自动设置，此处仅作参考）
data:
  input_path: "data/qualified_dataset.normalized.json"
  output_path: "results/synergy_experiments/experiment_results.jsonl"
  checkpoint_path: "results/synergy_experiments/checkpoint.json"
  save_metadata: true

# 日志
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  file: "logs/synergy_experiment.log"

# 实验特定配置
experiment:
  # 是否使用CoT（Chain of Thought）
  use_cot: true
  
  # 协同效应判断阈值
  synergy_thresholds:
    asr_boost: 0.2  # ASR提升超过20%视为协同
    confidence_boost: 0.15  # 置信度提升超过0.15视为协同
  
  # 是否保存中间结果
  save_intermediate: true
  
  # 是否在发现协同效应时提前停止（用于快速验证）
  early_stop_on_synergy: false
