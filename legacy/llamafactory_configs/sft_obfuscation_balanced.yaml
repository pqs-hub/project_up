### LLaMA-Factory训练配置 - Verilog代码混淆（平衡版本）

### 模型配置
model_name_or_path: /data3/pengqingsong/Model/Qwen2.5-Coder-7B/
trust_remote_code: true

### 数据配置
dataset: obfuscation_balanced
template: qwen
cutoff_len: 2048
overwrite_cache: true
preprocessing_num_workers: 16

### 训练配置
stage: sft
do_train: true
finetuning_type: full  # 全参数微调，可改为lora

### 输出配置
output_dir: /data3/pengqingsong/LLM_attack/saves/obfuscation_balanced_v1
logging_steps: 10
save_steps: 500
plot_loss: true
overwrite_output_dir: true

### 训练超参数
per_device_train_batch_size: 2
gradient_accumulation_steps: 8
learning_rate: 2.0e-5
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_steps: 100

### 优化配置
fp16: true                    # V100/RTX GPU使用
# bf16: true                  # A100/H100取消注释这行，并注释上面的fp16
optim: adamw_torch
gradient_checkpointing: true

### 其他配置
max_grad_norm: 1.0
logging_first_step: true
eval_strategy: "no"
save_strategy: steps
save_total_limit: 3

### 分布式训练（可选）
# ddp_timeout: 180000000
# deepspeed: examples/deepspeed/ds_z3_config.json  # ZeRO-3配置
