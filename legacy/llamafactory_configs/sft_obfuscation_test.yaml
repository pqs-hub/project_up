### LLaMA-Factory训练配置 - 快速测试版本

### 模型配置
model_name_or_path: /data3/pengqingsong/Model/Qwen2.5-Coder-7B/
trust_remote_code: true

### 数据配置
dataset: obfuscation_dedup  # 使用较小的去重数据集（16K样本）
template: qwen
cutoff_len: 2048
overwrite_cache: true
preprocessing_num_workers: 8
max_samples: 1000  # 只使用1000个样本快速测试

### 训练配置
stage: sft
do_train: true
finetuning_type: lora  # LoRA快速测试

### LoRA配置
lora_rank: 8
lora_alpha: 16
lora_dropout: 0.05
lora_target: all

### 输出配置
output_dir: /data3/pengqingsong/LLM_attack/saves/obfuscation_test
logging_steps: 5
save_steps: 100
plot_loss: true
overwrite_output_dir: true

### 训练超参数（快速测试）
per_device_train_batch_size: 4
gradient_accumulation_steps: 2
learning_rate: 5.0e-4
num_train_epochs: 1.0  # 只训练1个epoch
lr_scheduler_type: cosine
warmup_steps: 50

### 优化配置
fp16: true
optim: adamw_torch
gradient_checkpointing: true

### 其他配置
max_grad_norm: 1.0
logging_first_step: true
eval_strategy: "no"
save_strategy: steps
save_total_limit: 2

### 用途
# 这个配置用于:
# 1. 验证训练pipeline是否正常
# 2. 测试超参数
# 3. 快速迭代实验
# 
# 预计训练时间: 10-20分钟（A100）
