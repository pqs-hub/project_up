### Model
model_name_or_path: /mnt/public/pqs/Model/Qwen2.5-Coder-7B/

### Method
stage: sft
do_train: true
finetuning_type: lora
lora_target: all

### Dataset
dataset: verilog_attack_strategy
template: qwen
cutoff_len: 4096
max_samples: 1000  # 只使用1000个样本快速测试
overwrite_cache: true
preprocessing_num_workers: 16

### Output
output_dir: /mnt/public/pqs/Veri_atack/project_up/saves/attack_test
logging_steps: 10
save_steps: 100
plot_loss: true
overwrite_output_dir: true

### Train
per_device_train_batch_size: 2
gradient_accumulation_steps: 4
learning_rate: 5.0e-4
num_train_epochs: 1
lr_scheduler_type: cosine
warmup_steps: 50
fp16: true
ddp_timeout: 180000000

### LoRA
lora_rank: 8
lora_alpha: 16
lora_dropout: 0.05

### Eval
val_size: 0.1
per_device_eval_batch_size: 4
eval_strategy: steps
eval_steps: 100
